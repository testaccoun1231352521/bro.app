<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bro Circle</title>
    <link rel="stylesheet" href="/styles.css?v=2" />
  </head>
  <body>
    <div class="shell">
      <section id="usernameForm" class="card hero-card">
        <div class="hero-brand">
          <img src="/logo.svg" alt="Bro Circle logo" class="hero-logo" />
          <div>
            <p class="eyebrow">Private crew space</p>
            <h1>Bro Circle</h1>
            <p>Start a shared hub with one text channel and one voice channel for your bros.</p>
          </div>
        </div>
        <form class="hero-actions stack">
          <input id="usernameInput" type="text" placeholder="Enter your username" required />
          <input id="serverInput" type="text" placeholder="Server name (create or join)" required />
          <button type="submit">Enter server</button>
          <p class="helper-text">Create or join your own server by name.</p>
        </form>
        <div id="serverList" class="server-list hidden">
          <p class="helper-text">Existing servers</p>
          <div id="serverButtons" class="server-buttons"></div>
        </div>
      </section>

      <section id="appView" class="hidden">
        <header class="header card">
          <div class="brand-row">
            <img src="/logo.svg" alt="Bro Circle logo" class="header-logo" />
            <div>
              <p class="eyebrow">Discord-style hub</p>
              <h2 id="workspaceName">Bro Hub</h2>
            </div>
          </div>
        </header>

        <section class="card server-card">
          <div class="sidebar">
            <h3>Channels</h3>
            <div id="channelList" class="channel-list">
              <button type="button" class="channel-item active" data-channel="general"># general</button>
              <button type="button" class="channel-item" data-channel="rules">📜 rules</button>
              <button type="button" class="channel-item" data-channel="voice">🔊 voice</button>
            </div>
          </div>
          <div class="main-panel">
            <div class="stack">
              <h3 id="channelTitle">#general</h3>
              <div id="channelContent" class="channel-content"></div>
              <form id="messageForm" class="stack">
                <input id="messageInput" type="text" placeholder="Message the channel" required />
                <button type="submit">Send</button>
              </form>
            </div>
            <div class="voice-panel">
              <h3>Voice channel</h3>
              <p id="voiceStatus">Voice channel idle</p>
              <button id="voiceActionButton" type="button" class="hidden">Mute microphone</button>
              <button id="voiceLeaveButton" type="button" class="hidden">Leave voice</button>
              <strong>In voice</strong>
              <ul id="voiceUsersList"></ul>
              <strong>Online</strong>
              <ul id="membersList"></ul>
            </div>
          </div>
        </section>
      </section>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js?v=2"></script>
  </body>
</html>
