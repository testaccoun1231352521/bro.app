<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bro Circle</title>
    <link rel="stylesheet" href="/styles.css?v=2" />
  </head>
  <body>
    <div class="shell">
      <section id="usernameForm" class="card hero-card">
        <div class="hero-brand">
          <img src="/logo.svg" alt="Bro Circle logo" class="hero-logo" />
          <div>
            <p class="eyebrow">Private crew space</p>
            <h1>Bro Circle</h1>
            <p>Start a shared hub with one text channel and one voice channel for your bros.</p>
          </div>
        </div>
        <form class="hero-actions stack">
          <input id="usernameInput" type="text" placeholder="Enter your username" required />
          <button type="submit">Enter</button>
          <p class="helper-text">You will enter the default server right away.</p>
        </form>
      </section>

      <section id="appView" class="hidden">
        <header class="header card">
          <div class="brand-row">
            <img src="/logo.svg" alt="Bro Circle logo" class="header-logo" />
            <div>
              <p class="eyebrow">Discord-style hub</p>
              <h2 id="workspaceName">Bro Hub</h2>
            </div>
          </div>
        </header>

        <section class="card server-card">
          <div class="sidebar">
            <h3>Channels</h3>
            <div class="channel-pill"># <span id="textChannelName">general</span></div>
            <div class="channel-pill">🔊 <span>Voice</span></div>
          </div>
          <div class="main-panel">
            <div class="stack">
              <h3>Text channel</h3>
              <form id="messageForm" class="stack">
                <input id="messageInput" type="text" placeholder="Message the channel" required />
                <button type="submit">Send</button>
              </form>
              <div id="messagesList" class="messages"></div>
            </div>
            <div class="voice-panel">
              <h3>Voice channel</h3>
              <button id="voiceButton" type="button">Join voice</button>
              <p id="voiceStatus">Voice channel idle</p>
              <strong>In voice</strong>
              <ul id="voiceUsersList"></ul>
              <strong>Online</strong>
              <ul id="membersList"></ul>
            </div>
          </div>
        </section>
      </section>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js?v=2"></script>
  </body>
</html>
